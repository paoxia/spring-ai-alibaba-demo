spring:
  application:
    name: spring-ai-alibaba-demo
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.dashscope.springboot.DashScopeAutoConfiguration
      - com.alibaba.cloud.ai.dashscope.agent.DashScopeAgentAutoConfiguration
  ai:
    # OpenAI API 配置（使用 OpenAI 兼容接口）
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: https://ark.cn-beijing.volces.com/api/coding
      chat:
        options:
          model: glm-4.7
          temperature: 0.7
          top-p: 0.9
          max-tokens: 2000
    dashscope:
      chat:
        enabled: false # 关闭 DashScope 聊天模型自动配置
      embedding:
        enabled: false # 关闭 DashScope 向量模型自动配置
      image:
        enabled: false # 关闭 DashScope 绘图模型自动配置

server:
  port: 8080

logging:
  level:
    root: INFO
    com.alibaba.cloud.ai: DEBUG
    org.springframework.ai: DEBUG
