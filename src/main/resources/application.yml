spring:
  application:
    name: spring-ai-alibaba-demo
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:your-api-key-here}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          top-p: 0.9

server:
  port: 8080

logging:
  level:
    root: INFO
    com.alibaba.cloud.ai: DEBUG
